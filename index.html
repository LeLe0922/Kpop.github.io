.app{max-width:1100px;width:100%;background:rgba(255,249,245,0.85);border-radius:48px;padding:28px 30px 40px;box-shadow:0 20px 60px rgba(210,170,160,0.25);border:1px solid #ffede8;display:none}
.header{display:flex;justify-content:space-between;flex-wrap:wrap;border-bottom:2px dashed #f0d9d0;padding-bottom:16px;margin-bottom:24px}

.meta-info{display:flex;gap:18px;background:#fef6f2;padding:8px 18px;border-radius:40px;border:1px solid #f5ded6;font-weight:500;color:#7f6b63;font-size:14px}

.extra-info{margin-top:8px;font-size:14px;color:#b29084;display:flex;gap:20px}

.stat-item{display:flex;align-items:center;gap:10px}
.stat-item .label{min-width:62px;font-weight:600;font-size:14px}
.stat-item .bar-bg{flex:1;height:8px;background:#f2e3dc;border-radius:20px;overflow:hidden}
.stat-item .bar-fill{height:100%;border-radius:20px;transition:width .45s;background:linear-gradient(90deg,#f4b8a8,#dd9888)}
.stat-item .val{font-size:14px;font-weight:700;color:#b07d70;min-width:32px;text-align:right}
.interaction-area{background:#fffaf7;border-radius:32px;padding:24px 26px 30px;border:1px solid #f7e6df;margin-top:8px}

.month-badge{background:#e8cdc4;padding:2px 16px;border-radius:40px;font-size:15px}
.schedule-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.schedule-buttons button{background:#f5eae5;border:none;padding:10px 22px;border-radius:40px;font-weight:600;cursor:pointer;transition:.2s;border:1px solid transparent;flex:1 0 auto;font-size:14px}
.schedule-buttons button:hover:not(:disabled){background:#eccec2;transform:translateY(-2px);border-color:#dbb6aa}
.schedule-buttons button:disabled{opacity:.4;pointer-events:none}
.story-box{background:#fff7f3;border-radius:24px;padding:20px 24px;margin:14px 0 10px;border-left:6px solid #ecc6ba;min-height:100px}

// ========== 辅助函数 ==========
function getStatValue(k){ return Math.min(100,Math.max(0,state.stats[k]||0)); }
function applyEffects(effects){ var msg=[]; for(var k in effects){ if(state.stats.hasOwnProperty(k)){ var old=state.stats[k], delta=effects[k], nv=Math.min(100,Math.max(0,old+delta)); state.stats[k]=nv; if(delta!==0){ msg.push(STAT_LABELS[k]+' '+(delta>0?'+':'')+delta); } } } return msg.join(' · '); }
function addFlag(flag){ if(flag && !state.flags.includes(flag)){ state.flags.push(flag); if(state.flags.length>5) state.flags.shift(); } }

// ========== 渲染 ==========
function renderStats(){
    var grid=document.getElementById('statsGrid'); grid.innerHTML='';
    STAT_KEYS.forEach(function(key){
        var val=getStatValue(key);
        var div=document.createElement('div'); div.className='stat-item';
        div.innerHTML='<span class="label">'+STAT_LABELS[key]+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+val+'%;background:'+STAT_COLORS[STAT_KEYS.indexOf(key)]+';"></div></div><span class="val">'+Math.round(val)+'</span>';
        grid.appendChild(div);
    });
    document.getElementById('popularityLabel').textContent=Math.round(getStatValue('popularity'));
    document.getElementById('staminaLabel').textContent=Math.round(getStatValue('stamina'));
    var avg=STAT_KEYS.filter(function(k){return k!=='popularity'&&k!=='stamina'&&k!=='mental';}).reduce(function(s,k){return s+getStatValue(k);},0)/4;
    var rank='F'; if(avg>80) rank='A'; else if(avg>65) rank='B'; else if(avg>50) rank='C'; else if(avg>35) rank='D'; else rank='E';
    document.getElementById('rankDisplay').textContent=rank;
}
function renderRadar(){
    try{
        var canvas=document.getElementById('radarCanvas'); if(!canvas) return;
        var ctx=canvas.getContext('2d'); if(!ctx) return;
        var w=canvas.width, h=canvas.height;
        ctx.clearRect(0,0,w,h);
        var cx=w/2, cy=h/2+6, radius=Math.min(w,h)*0.38, keys=STAT_KEYS, n=keys.length;
        var angles=keys.map(function(_,i){ return (i/n)*2*Math.PI - Math.PI/2; });
        ctx.strokeStyle='#f0ddd5'; ctx.lineWidth=1.2;
        for(var level=1; level<=5; level++){ var r=radius/5*level; ctx.beginPath(); for(var i=0;i<n;i++){ var x=cx+r*Math.cos(angles[i]), y=cy+r*Math.sin(angles[i]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.closePath(); ctx.stroke(); }
        for(var i=0;i<n;i++){ var x=cx+radius*Math.cos(angles[i]), y=cy+radius*Math.sin(angles[i]); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.strokeStyle='#f0ddd5'; ctx.stroke(); var lr=radius+18, lx=cx+lr*Math.cos(angles[i]), ly=cy+lr*Math.sin(angles[i]); ctx.fillStyle='#b29084'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(STAT_LABELS[keys[i]],lx,ly); }
        var values=keys.map(function(k){ return getStatValue(k)/100; });
        ctx.beginPath(); for(var i=0;i<n;i++){ var r=radius*values[i], x=cx+r*Math.cos(angles[i]), y=cy+r*Math.sin(angles[i]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.closePath(); ctx.fillStyle='rgba(221,160,145,0.35)'; ctx.fill(); ctx.strokeStyle='#d4877a'; ctx.lineWidth=2.5; ctx.stroke(); for(var i=0;i<n;i++){ var r=radius*values[i], x=cx+r*Math.cos(angles[i]), y=cy+r*Math.sin(angles[i]); ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI); ctx.fillStyle='#d4877a'; ctx.fill(); }
    }catch(e){ console.warn('雷达图出错',e); }
}
function updateUI(){
    renderStats(); renderRadar();
    var m=state.month+1, year=Math.ceil(m/12), mon=((m-1)%12)+1;
    document.getElementById('monthDisplay').textContent=m;
    document.getElementById('monthYear').textContent='第 '+year+' 年 · '+mon+' 月';
    document.getElementById('flagDisplay').textContent=state.flags.length?state.flags.slice(-1)[0]:'新人';
    document.getElementById('playerNameDisplay').textContent=state.name;
}

// ========== 核心流程 ==========
function handleSchedule(action){
    if(state.gameOver || state.phase!=='schedule') return;
    var effects={}, baseMsg='';
    switch(action){
        case'dance': effects={dance:6+Math.floor(Math.random()*4), stamina:-4, mental:1}; baseMsg='💃 练舞'; break;
        case'vocal': effects={vocal:6+Math.floor(Math.random()*4), stamina:-3, mental:1}; baseMsg='🎤 练声'; break;
        case'rap': effects={rap:6+Math.floor(Math.random()*4), stamina:-3, mental:1}; baseMsg='🎧 说唱'; break;
        case'visual': effects={visual:7+Math.floor(Math.random()*3), popularity:2}; baseMsg='✨ 外貌'; break;
        case'rest': effects={stamina:10+Math.floor(Math.random()*5), mental:6, popularity:-1}; baseMsg='🧘 休息'; break;
        case'social': effects={popularity:8+Math.floor(Math.random()*5), mental:-3, visual:2}; baseMsg='📱 社交'; break;
        case'mental': effects={mental:10+Math.floor(Math.random()*5), stamina:-2}; baseMsg='🧠 心理'; break;
        default: return;
    }
    for(var k in effects){ if(state.stats.hasOwnProperty(k)){ var v=state.stats[k]+effects[k]; state.stats[k]=Math.min(100,Math.max(0,v)); } }
    var feedback=applyEffects(effects);
    document.getElementById('feedbackToast').textContent='✅ '+baseMsg+' → '+feedback;
    updateUI();
    state.phase='story';
    document.getElementById('phaseBadge').textContent='🎬 剧情选择';
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=true; });
    triggerStory();
}
function triggerStory(){
    var month=state.month;
    var story=STORY_EVENTS[month];
    if(!story){
        story={text:'本月训练平稳。', options:[
            {text:'🎯 基本功', effect:{vocal:2,dance:2,stamina:-1}, flag:'basic'},
            {text:'📈 挑战高难', effect:{dance:3,stamina:-2,mental:1}, flag:'challenger'},
            {text:'🧘 放松调整', effect:{stamina:3,mental:3}, flag:'relax'},
            {text:'🎵 新曲目', effect:{vocal:3,rap:2}, flag:'newmusic'}
        ]};
    }
    state.pendingStory=story;
    document.getElementById('storyText').textContent=story.text||'发生了一些事...';
    var optContainer=document.getElementById('storyOptions');
    optContainer.innerHTML='';
    if(story.options && story.options.length>0){
        story.options.forEach(function(opt,idx){
            var btn=document.createElement('button');
            btn.textContent=opt.text||'选项 '+(idx+1);
            btn.onclick=function(){ handleStoryChoice(idx); };
            optContainer.appendChild(btn);
        });
    } else { setTimeout(function(){ finishMonth(); },800); }
}
function handleStoryChoice(idx){
    if(state.storyChosen || state.gameOver) return;
    state.storyChosen=true;
    var story=state.pendingStory;
    if(!story || !story.options || !story.options[idx]) return;
    var choice=story.options[idx];
    if(choice.effect){ for(var k in choice.effect){ if(state.stats.hasOwnProperty(k)){ var v=state.stats[k]+choice.effect[k]; state.stats[k]=Math.min(100,Math.max(0,v)); } } }
    if(choice.flag) addFlag(choice.flag);
    var feedback=choice.effect?applyEffects(choice.effect):'无属性变化';
    document.getElementById('feedbackToast').textContent='📖 剧情选择: '+choice.text+' → '+feedback;
    updateUI();
    document.querySelectorAll('#storyOptions button').forEach(function(b){ b.disabled=true; });
    setTimeout(function(){ finishMonth(); },900);
}
function finishMonth(){
    state.month++;
    state.storyChosen=false;
    state.phase='schedule';
    document.getElementById('phaseBadge').textContent='📋 安排日程';
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=false; });
    document.getElementById('storyOptions').innerHTML='';
    if(state.month>=36){ state.gameOver=true; showEnding(); return; }
    var msgs=['🌈 新的一月！','☕ 咖啡厅新品～','📈 表现不错！','🌙 梦想发光。','🎵 新编舞老师！','📱 粉丝增长。','💪 体能加量。'];
    document.getElementById('storyText').textContent=msgs[state.month%msgs.length]+'\n请选择本月的训练日程。';
    document.getElementById('feedbackToast').textContent='📅 新的一月，选择日程！';
    updateUI();
}
