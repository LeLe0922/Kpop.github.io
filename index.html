<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 练习生 · 三年之约</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Malgun Gothic',sans-serif;background:#fcf6f0;color:#4a3b3b;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(252,246,240,0.92);backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:center;z-index:999;transition:opacity .4s}
#startScreen.hidden{opacity:0;pointer-events:none}
.start-card{background:#fffcf9;border-radius:60px;padding:40px 50px;max-width:420px;width:90%;text-align:center;border:1px solid #f7e6df;box-shadow:0 30px 60px rgba(200,170,160,0.25)}
.start-card h1{font-size:32px;background:linear-gradient(145deg,#e8a99c,#d4877a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.start-card p{color:#7f6b63;margin-bottom:24px;font-size:15px}
.start-card input{width:100%;padding:14px 20px;border:2px solid #eedad2;border-radius:60px;font-size:18px;text-align:center;background:#fff5f0;outline:none;transition:.2s;color:#4a3730;font-weight:600}
.start-card input:focus{border-color:#dbaa9a;background:#fff;box-shadow:0 0 0 4px #f5ded6}
.start-card button{margin-top:20px;padding:14px 40px;border:none;border-radius:60px;background:linear-gradient(145deg,#f0cdc0,#e0b8aa);color:#4a3730;font-size:18px;font-weight:700;cursor:pointer;transition:.25s;border:1px solid #eedad2}
.start-card button:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,150,140,0.3)}
.app{max-width:1100px;width:100%;background:rgba(255,249,245,0.85);border-radius:48px;padding:28px 30px 40px;box-shadow:0 20px 60px rgba(210,170,160,0.25);border:1px solid #ffede8;display:none}
.header{display:flex;justify-content:space-between;flex-wrap:wrap;border-bottom:2px dashed #f0d9d0;padding-bottom:16px;margin-bottom:24px}
.header h1{font-size:28px;background:linear-gradient(145deg,#e8a99c,#d4877a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.meta-info{display:flex;gap:18px;background:#fef6f2;padding:8px 18px;border-radius:40px;border:1px solid #f5ded6;font-weight:500;color:#7f6b63;font-size:14px}
.meta-info span{color:#b07d70;font-weight:600}
.profile-radar-row{display:flex;flex-wrap:wrap;gap:24px;background:#fffcf9;border-radius:32px;padding:24px 28px;border:1px solid #f7e6df;margin-bottom:28px}
.profile-card{flex:1.2;min-width:220px;display:flex;flex-direction:column;gap:8px}
.name-area{display:flex;align-items:center;gap:14px;margin-bottom:4px;flex-wrap:wrap}
.name-display{font-size:28px;font-weight:700;background:#fff5f0;padding:4px 20px;border-radius:40px;border:1px solid #eedad2}
.badge{background:#f0dbd4;padding:4px 16px;border-radius:40px;font-size:14px;font-weight:600}
.profile-detail{display:flex;flex-wrap:wrap;gap:12px 20px;font-size:15px;color:#6b554c;margin-top:4px}
.profile-detail .tag{background:#f4e8e2;padding:4px 16px;border-radius:30px}
.extra-info{margin-top:8px;font-size:14px;color:#b29084;display:flex;gap:20px}
.radar-wrapper{flex:2.2;min-width:250px;height:240px;display:flex;justify-content:center;align-items:center;background:#fffaf7;border-radius:28px;border:1px solid #f4e0d8}
#radarCanvas{max-width:280px;max-height:230px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px 18px;background:#fffcf9;padding:18px 20px;border-radius:28px;border:1px solid #f7e6df;margin:16px 0 22px}
.stat-item{display:flex;align-items:center;gap:10px}
.stat-item .label{min-width:62px;font-weight:600;font-size:14px}
.stat-item .bar-bg{flex:1;height:8px;background:#f2e3dc;border-radius:20px;overflow:hidden}
.stat-item .bar-fill{height:100%;border-radius:20px;transition:width .45s;background:linear-gradient(90deg,#f4b8a8,#dd9888)}
.stat-item .val{font-size:14px;font-weight:700;color:#b07d70;min-width:32px;text-align:right}
.interaction-area{background:#fffaf7;border-radius:32px;padding:24px 26px 30px;border:1px solid #f7e6df;margin-top:8px}
.phase-title{font-size:18px;font-weight:700;display:flex;gap:12px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.month-badge{background:#e8cdc4;padding:2px 16px;border-radius:40px;font-size:15px}
.schedule-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.schedule-buttons button{background:#f5eae5;border:none;padding:10px 22px;border-radius:40px;font-weight:600;cursor:pointer;transition:.2s;border:1px solid transparent;flex:1 0 auto;font-size:14px}
.schedule-buttons button:hover:not(:disabled){background:#eccec2;transform:translateY(-2px);border-color:#dbb6aa}
.schedule-buttons button:disabled{opacity:.4;pointer-events:none}
.story-box{background:#fff7f3;border-radius:24px;padding:20px 24px;margin:14px 0 10px;border-left:6px solid #ecc6ba;min-height:100px}
.story-text{font-size:15px;line-height:1.9;white-space:pre-wrap}
.story-options{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.story-options button{background:#fff;border:1.5px solid #e5cdc2;padding:8px 22px;border-radius:40px;font-weight:600;cursor:pointer;flex:1 0 auto;font-size:14px}
.story-options button:hover:not(:disabled){background:#f5ddd4;border-color:#caaaa0}
.story-options button:disabled{opacity:.3;pointer-events:none}
.feedback-toast{margin-top:16px;padding:10px 16px;background:#f3e3db;border-radius:30px;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px}
.reset-area{margin-top:20px;text-align:right}
.reset-btn{background:#eedbd2;border:none;padding:8px 28px;border-radius:40px;font-weight:600;cursor:pointer;font-size:14px}
.reset-btn:hover{background:#e2c7bb}
#endingModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,15,15,0.7);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:1000;padding:30px}
.ending-card{background:#fffcf9;border-radius:48px;padding:40px 50px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;text-align:center;border:1px solid #f7e6df;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
.ending-card .big-icon{font-size:72px;display:block;margin-bottom:10px}
.ending-card .ending-title{font-size:32px;font-weight:800;color:#b07d70;margin-bottom:12px}
.ending-card .ending-desc{font-size:17px;line-height:2;color:#4a3b3b;text-align:left;margin:16px 0 20px}
.ending-card .ending-tags{background:#f5eae5;padding:12px 20px;border-radius:30px;font-size:15px;margin:16px 0 24px}
.ending-card .ending-btn{background:linear-gradient(145deg,#f0cdc0,#e0b8aa);border:none;padding:12px 40px;border-radius:60px;font-size:18px;font-weight:700;cursor:pointer;transition:.25s;border:1px solid #eedad2}
.ending-card .ending-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,150,140,0.3)}
@media(max-width:700px){.app{padding:18px 14px}.profile-radar-row{flex-direction:column}.radar-wrapper{height:200px}.ending-card{padding:30px 20px}.start-card{padding:30px 20px}}
</style>
</head>
<body>

<!-- 起名界面 -->
<div id="startScreen"><div class="start-card"><h1>🌸 练习生 · 三年之约</h1><p>请输入你的名字，开启专属偶像之旅</p><input type="text" id="nameInput" placeholder="输入名字" value="林娜恩" maxlength="10"><button id="startBtn">🎤 开始</button></div></div>

<div id="endingModal"><div class="ending-card" id="endingContent"></div></div>

<div class="profile-radar-row">
<div class="profile-card">

</div>

<div class="stats-grid" id="statsGrid"></div>

<div class="interaction-area">
<div class="phase-title"><span>🗓️ <span id="monthYear">第 1 年 · 1 月</span></span><span class="month-badge" id="phaseBadge">📋 安排日程</span></div>
<div class="schedule-buttons" id="scheduleButtons">

<div class="story-box"><div class="story-text" id="storyText">👋 欢迎来到 DreamHaus！<br>作为新入社的练习生，你即将开始为期三年的逐梦之旅。请先安排你第一个月的训练计划吧！</div><div class="story-options" id="storyOptions"></div></div>
<div class="feedback-toast" id="feedbackToast">✨ 点击日程安排你的本月计划</div>
<div class="reset-area"><button class="reset-btn" id="resetBtn">🔄 重新开始</button></div>
</div>
</div>

// ----- 辅助函数 -----
function getStatValue(k){return Math.min(100,Math.max(0,state.stats[k]||0));}
function applyEffects(effects){let msg=[];for(let k in effects){if(state.stats.hasOwnProperty(k)){let old=state.stats[k],delta=effects[k],nv=Math.min(100,Math.max(0,old+delta));state.stats[k]=nv;if(delta!==0){msg.push(STAT_LABELS[k]+' '+(delta>0?'+':'')+delta);}}}return msg.join(' · ');}
function addFlag(flag){if(flag&&!state.flags.includes(flag)){state.flags.push(flag);if(state.flags.length>5)state.flags.shift();}}

function renderStats(){
const grid=document.getElementById('statsGrid');grid.innerHTML='';
STAT_KEYS.forEach(key=>{const val=getStatValue(key);const div=document.createElement('div');div.className='stat-item';div.innerHTML='<span class="label">'+STAT_LABELS[key]+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+val+'%;background:'+STAT_COLORS[STAT_KEYS.indexOf(key)]+';"></div></div><span class="val">'+Math.round(val)+'</span>';grid.appendChild(div);});
document.getElementById('popularityLabel').textContent=Math.round(getStatValue('popularity'));
document.getElementById('staminaLabel').textContent=Math.round(getStatValue('stamina'));
const avg=STAT_KEYS.filter(k=>k!=='popularity'&&k!=='stamina'&&k!=='mental').reduce((s,k)=>s+getStatValue(k),0)/4;
let rank='F';if(avg>80)rank='A';else if(avg>65)rank='B';else if(avg>50)rank='C';else if(avg>35)rank='D';else rank='E';
document.getElementById('rankDisplay').textContent=rank;
}

function renderRadar(){try{const canvas=document.getElementById('radarCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');if(!ctx)return;const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);const cx=w/2,cy=h/2+6,radius=Math.min(w,h)*0.38,keys=STAT_KEYS,n=keys.length,angles=keys.map((_,i)=>(i/n)*2*Math.PI-Math.PI/2);ctx.strokeStyle='#f0ddd5';ctx.lineWidth=1.2;for(let level=1;level<=5;level++){const r=radius/5*level;ctx.beginPath();for(let i=0;i<n;i++){const x=cx+r*Math.cos(angles[i]),y=cy+r*Math.sin(angles[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.stroke();}for(let i=0;i<n;i++){const x=cx+radius*Math.cos(angles[i]),y=cy+radius*Math.sin(angles[i]);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.strokeStyle='#f0ddd5';ctx.stroke();const lr=radius+18,lx=cx+lr*Math.cos(angles[i]),ly=cy+lr*Math.sin(angles[i]);ctx.fillStyle='#b29084';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(STAT_LABELS[keys[i]],lx,ly);}const values=keys.map(k=>getStatValue(k)/100);ctx.beginPath();for(let i=0;i<n;i++){const r=radius*values[i],x=cx+r*Math.cos(angles[i]),y=cy+r*Math.sin(angles[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.fillStyle='rgba(221,160,145,0.35)';ctx.fill();ctx.strokeStyle='#d4877a';ctx.lineWidth=2.5;ctx.stroke();for(let i=0;i<n;i++){const r=radius*values[i],x=cx+r*Math.cos(angles[i]),y=cy+r*Math.sin(angles[i]);ctx.beginPath();ctx.arc(x,y,5,0,2*Math.PI);ctx.fillStyle='#d4877a';ctx.fill();}}catch(e){console.warn('雷达图出错',e);}}
function updateUI(){renderStats();renderRadar();const m=state.month+1,year=Math.ceil(m/12),mon=((m-1)%12)+1;document.getElementById('monthDisplay').textContent=m;document.getElementById('monthYear').textContent='第 '+year+' 年 · '+mon+' 月';document.getElementById('flagDisplay').textContent=state.flags.length?state.flags.slice(-1)[0]:'新人';document.getElementById('playerNameDisplay').textContent=state.name;}

// ----- 核心流程 -----
function handleSchedule(action){if(state.gameOver||state.phase!=='schedule')return;let effects={},baseMsg='';switch(action){case'dance':effects={dance:6+Math.floor(Math.random()*4),stamina:-4,mental:1};baseMsg='💃 练舞';break;case'vocal':effects={vocal:6+Math.floor(Math.random()*4),stamina:-3,mental:1};baseMsg='🎤 练声';break;case'rap':effects={rap:6+Math.floor(Math.random()*4),stamina:-3,mental:1};baseMsg='🎧 说唱';break;case'visual':effects={visual:7+Math.floor(Math.random()*3),popularity:2};baseMsg='✨ 外貌管理';break;case'rest':effects={stamina:10+Math.floor(Math.random()*5),mental:6,popularity:-1};baseMsg='🧘 休息';break;case'social':effects={popularity:8+Math.floor(Math.random()*5),mental:-3,visual:2};baseMsg='📱 社交';break;case'mental':effects={mental:10+Math.floor(Math.random()*5),stamina:-2};baseMsg='🧠 心理';break;default:return;}for(let k in effects){if(state.stats.hasOwnProperty(k)){let v=state.stats[k]+effects[k];state.stats[k]=Math.min(100,Math.max(0,v));}}const feedback=applyEffects(effects);document.getElementById('feedbackToast').textContent='✅ '+baseMsg+' → '+feedback;updateUI();state.phase='story';document.getElementById('phaseBadge').textContent='🎬 剧情选择';document.querySelectorAll('#scheduleButtons button').forEach(b=>b.disabled=true);triggerStory();}

function triggerStory(){const month=state.month;let story=STORY_EVENTS[month];if(!story){story={text:'这个月你专注于基础训练。',options:[
{text:'🎯 巩固基本功',effect:{vocal:2,dance:2,stamina:-1},flag:'basic'},
{text:'📈 挑战高难度动作',effect:{dance:3,stamina:-2,mental:1},flag:'challenger'},
{text:'🧘 放松身心，调整状态',effect:{stamina:3,mental:3},flag:'relax'},
{text:'🎵 练习新曲目',effect:{vocal:3,rap:2},flag:'newmusic'}]};}
state.pendingStory=story;document.getElementById('storyText').textContent=story.text||'发生了一些事...';const optContainer=document.getElementById('storyOptions');optContainer.innerHTML='';if(story.options&&story.options.length>0){story.options.forEach((opt,idx)=>{const btn=document.createElement('button');btn.textContent=opt.text||'选项 '+(idx+1);btn.onclick=()=>handleStoryChoice(idx);optContainer.appendChild(btn);});}else{setTimeout(()=>{finishMonth();},800);}}

function handleStoryChoice(idx){if(state.storyChosen||state.gameOver)return;state.storyChosen=true;const story=state.pendingStory;if(!story||!story.options||!story.options[idx])return;const choice=story.options[idx];if(choice.effect){for(let k in choice.effect){if(state.stats.hasOwnProperty(k)){let v=state.stats[k]+choice.effect[k];state.stats[k]=Math.min(100,Math.max(0,v));}}}if(choice.flag)addFlag(choice.flag);const feedback=choice.effect?applyEffects(choice.effect):'无属性变化';document.getElementById('feedbackToast').textContent='📖 剧情选择: '+choice.text+' → '+feedback;updateUI();document.querySelectorAll('#storyOptions button').forEach(b=>b.disabled=true);setTimeout(()=>{finishMonth();},900);}

function finishMonth(){state.month++;state.storyChosen=false;state.phase='schedule';document.getElementById('phaseBadge').textContent='📋 安排日程';document.querySelectorAll('#scheduleButtons button').forEach(b=>b.disabled=false);document.getElementById('storyOptions').innerHTML='';if(state.month>=36){state.gameOver=true;showEnding();return;}const msgs=['🌈 新的一月，继续加油！','☕ 公司咖啡厅出了新品～','📈 上个月表现不错！','🌙 夜深了，梦想还在发光。','🎵 新编舞老师加入！','📱 粉丝数稳步增长。','💪 体能训练加量了。'];document.getElementById('storyText').textContent=msgs[state.month%msgs.length]+'\n请选择本月的训练日程。';document.getElementById('feedbackToast').textContent='📅 新的一月，选择你的日程吧！';updateUI();}
