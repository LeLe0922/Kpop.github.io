<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试起名</title>
    <style>
        body { font-family: Arial; background: #fcf6f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #startScreen { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #gameApp { display: none; text-align: center; background: white; padding: 40px; border-radius: 20px; }
        input { padding: 10px; font-size: 18px; border-radius: 10px; border: 1px solid #ccc; margin: 10px 0; }
        button { padding: 10px 30px; font-size: 18px; border: none; background: #e0b8aa; border-radius: 30px; cursor: pointer; }
        button:hover { background: #d4877a; }
    </style>
</head>
<body>

    <!-- 起名界面 -->
    <div id="startScreen">
        <h1>🌸 练习生</h1>
        <p>输入名字开始</p>
        <input type="text" id="nameInput" value="林娜恩">
        <br>
        <button id="startBtn">开始</button>
    </div>

    <!-- 游戏主界面 -->
    <div id="gameApp">
        <h1>游戏主界面</h1>
        <p>你好，<span id="playerNameDisplay"></span>！</p>
        <p>这里将显示游戏内容</p>
        <button id="resetBtn">返回起名</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const startScreen = document.getElementById('startScreen');
            const gameApp = document.getElementById('gameApp');
            const nameInput = document.getElementById('nameInput');
            const playerNameDisplay = document.getElementById('playerNameDisplay');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');

            function startGame() {
                const name = nameInput.value.trim() || '练习生';
                playerNameDisplay.textContent = name;
                startScreen.style.display = 'none';
                gameApp.style.display = 'block';
            }

            function resetGame() {
                startScreen.style.display = 'block';
                gameApp.style.display = 'none';
            }

            startBtn.addEventListener('click', startGame);
            nameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') startGame();
            });
            resetBtn.addEventListener('click', resetGame);

            // 初始状态
            startScreen.style.display = 'block';
            gameApp.style.display = 'none';
        });
    </script>
</body>
</html>
