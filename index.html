<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 练习生模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Malgun Gothic',sans-serif;background:#fcf6f0;color:#4a3b3b;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(252,246,240,0.92);backdrop-filter:blur(6px);display:flex;justify-content:center;align-items:center;z-index:999;transition:opacity .4s}
#startScreen.hidden{opacity:0;pointer-events:none}
#startGlow{position:fixed;top:50%;left:50%;width:0;height:0;background:radial-gradient(circle,rgba(232,169,156,0.6),rgba(212,135,122,0.2),transparent);border-radius:50%;transform:translate(-50%,-50%);z-index:998;pointer-events:none;transition:all .8s cubic-bezier(0.34,1.56,0.64,1);opacity:0}
#startGlow.active{width:800px;height:800px;opacity:1}
.start-card{background:#fffcf9;border-radius:60px;padding:40px 50px;max-width:420px;width:90%;text-align:center;border:1px solid #f7e6df;box-shadow:0 30px 60px rgba(200,170,160,0.25)}
.start-card h1{font-size:32px;background:linear-gradient(145deg,#e8a99c,#d4877a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.start-card p{color:#7f6b63;margin-bottom:24px;font-size:15px}
.start-card input{width:100%;padding:14px 20px;border:2px solid #eedad2;border-radius:60px;font-size:18px;text-align:center;background:#fff5f0;outline:none;transition:.2s;color:#4a3730;font-weight:600}
.start-card input:focus{border-color:#dbaa9a;background:#fff;box-shadow:0 0 0 4px #f5ded6}
.start-card button{margin-top:20px;padding:14px 40px;border:none;border-radius:60px;background:linear-gradient(145deg,#f0cdc0,#e0b8aa);color:#4a3730;font-size:18px;font-weight:700;cursor:pointer;transition:.25s;border:1px solid #eedad2}
.start-card button:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,150,140,0.3)}
.app{max-width:1100px;width:100%;background:rgba(255,249,245,0.85);border-radius:48px;padding:28px 30px 40px;box-shadow:0 20px 60px rgba(210,170,160,0.25);border:1px solid #ffede8;display:none;opacity:0;transition:opacity .8s ease}
.app.fade-in{opacity:1}
.header{display:flex;justify-content:space-between;flex-wrap:wrap;border-bottom:2px dashed #f0d9d0;padding-bottom:16px;margin-bottom:24px}
.header h1{font-size:28px;background:linear-gradient(145deg,#e8a99c,#d4877a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.meta-info{display:flex;gap:18px;background:#fef6f2;padding:8px 18px;border-radius:40px;border:1px solid #f5ded6;font-weight:500;color:#7f6b63;font-size:14px}
.meta-info span{color:#b07d70;font-weight:600}
.profile-radar-row{display:flex;flex-wrap:wrap;gap:24px;background:#fffcf9;border-radius:32px;padding:24px 28px;border:1px solid #f7e6df;margin-bottom:28px}
.profile-card{flex:1.2;min-width:220px;display:flex;flex-direction:column;gap:8px}
.name-area{display:flex;align-items:center;gap:14px;margin-bottom:4px;flex-wrap:wrap}
.name-display{font-size:28px;font-weight:700;background:#fff5f0;padding:4px 20px;border-radius:40px;border:1px solid #eedad2}
.badge{background:#f0dbd4;padding:4px 16px;border-radius:40px;font-size:14px;font-weight:600}
.profile-detail{display:flex;flex-wrap:wrap;gap:12px 20px;font-size:15px;color:#6b554c;margin-top:4px}
.profile-detail .tag{background:#f4e8e2;padding:4px 16px;border-radius:30px}
.extra-info{margin-top:8px;font-size:14px;color:#b29084;display:flex;gap:20px}
.radar-wrapper{flex:2.2;min-width:250px;height:240px;display:flex;justify-content:center;align-items:center;background:#fffaf7;border-radius:28px;border:1px solid #f4e0d8}
#radarCanvas{max-width:280px;max-height:230px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px 18px;background:#fffcf9;padding:18px 20px;border-radius:28px;border:1px solid #f7e6df;margin:16px 0 22px}
.stat-item{display:flex;align-items:center;gap:10px}
.stat-item .label{min-width:62px;font-weight:600;font-size:14px}
.stat-item .bar-bg{flex:1;height:8px;background:#f2e3dc;border-radius:20px;overflow:hidden}
.stat-item .bar-fill{height:100%;border-radius:20px;transition:width .45s;background:linear-gradient(90deg,#f4b8a8,#dd9888)}
.stat-item .val{font-size:14px;font-weight:700;color:#b07d70;min-width:32px;text-align:right}
.interaction-area{background:#fffaf7;border-radius:32px;padding:24px 26px 30px;border:1px solid #f7e6df;margin-top:8px}
.phase-title{font-size:18px;font-weight:700;display:flex;gap:12px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.month-badge{background:#e8cdc4;padding:2px 16px;border-radius:40px;font-size:15px}
.schedule-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.schedule-buttons button{background:#f5eae5;border:none;padding:10px 22px;border-radius:40px;font-weight:600;cursor:pointer;transition:.2s;border:1px solid transparent;flex:1 0 auto;font-size:14px}
.schedule-buttons button:hover:not(:disabled){background:#eccec2;transform:translateY(-2px);border-color:#dbb6aa}
.schedule-buttons button:disabled{opacity:.4;pointer-events:none}
.story-box{background:#fff7f3;border-radius:24px;padding:20px 24px;margin:14px 0 10px;border-left:6px solid #ecc6ba;min-height:120px}
.story-text{font-size:15px;line-height:1.9;white-space:pre-wrap}
.story-options{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.story-options button{background:#fff;border:1.5px solid #e5cdc2;padding:8px 22px;border-radius:40px;font-weight:600;cursor:pointer;flex:1 0 auto;font-size:14px}
.story-options button:hover:not(:disabled){background:#f5ddd4;border-color:#caaaa0}
.story-options button:disabled{opacity:.3;pointer-events:none}
.feedback-toast{margin-top:16px;padding:10px 16px;background:#f3e3db;border-radius:30px;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px}
.reset-area{margin-top:20px;text-align:right}
.reset-btn{background:#eedbd2;border:none;padding:8px 28px;border-radius:40px;font-weight:600;cursor:pointer;font-size:14px}
.reset-btn:hover{background:#e2c7bb}
#milestoneModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,15,15,0.6);backdrop-filter:blur(4px);display:none;justify-content:center;align-items:center;z-index:1001;padding:30px}
.milestone-card{background:#fffcf9;border-radius:40px;padding:30px 40px;max-width:480px;width:100%;text-align:center;border:1px solid #f7e6df;box-shadow:0 30px 60px rgba(0,0,0,0.3);animation:milestonePop .5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes milestonePop{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
.milestone-card .ms-icon{font-size:56px;display:block;margin-bottom:6px}
.milestone-card .ms-title{font-size:22px;font-weight:800;color:#b07d70;margin-bottom:8px}
.milestone-card .ms-desc{font-size:16px;line-height:1.8;color:#4a3b3b}
.milestone-card .ms-btn{margin-top:16px;padding:8px 30px;border:none;border-radius:40px;background:linear-gradient(145deg,#f0cdc0,#e0b8aa);font-size:15px;font-weight:700;cursor:pointer;border:1px solid #eedad2}
.milestone-card .ms-btn:hover{transform:scale(1.03)}
#endingModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,15,15,0.7);display:none;justify-content:center;align-items:center;z-index:1000;padding:30px}
#endingModal .spotlight{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(ellipse,rgba(255,215,150,0.3),transparent 70%);border-radius:50%;pointer-events:none;animation:spotlightPulse 3s ease-in-out infinite}
@keyframes spotlightPulse{0%,100%{transform:translateX(-50%) scale(0.8);opacity:0.6}50%{transform:translateX(-50%) scale(1.2);opacity:1}}
.ending-card{position:relative;background:#fffcf9;border-radius:48px;padding:40px 50px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;text-align:center;border:1px solid #f7e6df;box-shadow:0 40px 80px rgba(0,0,0,0.5);z-index:1;animation:endingPop .6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes endingPop{0%{transform:scale(0.5) rotate(-2deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.ending-card .big-icon{font-size:72px;display:block;margin-bottom:10px}
.ending-card .ending-title{font-size:32px;font-weight:800;color:#b07d70;margin-bottom:12px}
.ending-card .ending-desc{font-size:17px;line-height:2;color:#4a3b3b;text-align:left;margin:16px 0 20px}
.ending-card .ending-tags{background:#f5eae5;padding:12px 20px;border-radius:30px;font-size:15px;margin:16px 0 24px}
.ending-card .ending-btn{background:linear-gradient(145deg,#f0cdc0,#e0b8aa);border:none;padding:12px 40px;border-radius:60px;font-size:18px;font-weight:700;cursor:pointer;transition:.25s;border:1px solid #eedad2}
.ending-card .ending-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,150,140,0.3)}
@media(max-width:700px){.app{padding:18px 14px}.profile-radar-row{flex-direction:column}.radar-wrapper{height:200px}.ending-card{padding:30px 20px}.start-card{padding:30px 20px}}
</style>
</head>
<body>

<!-- 起名界面 -->
<div id="startScreen"><div class="start-card"><h1>🌸 练习生模拟器</h1><p>请输入你的名字，开启专属偶像之旅</p><input type="text" id="nameInput" placeholder="输入名字" value="姓名" maxlength="10"><button onclick="window.startGame()">🎤 开始</button></div></div>
<div id="startGlow"></div>

<!-- 里程碑弹窗 -->
<div id="milestoneModal"><div class="milestone-card" id="milestoneContent"></div></div>

<!-- 结局弹窗 -->
<div id="endingModal"><div class="spotlight"></div><div class="ending-card" id="endingContent"></div></div>

<!-- 主游戏 -->
<div class="app" id="gameApp">
<div class="header"><h1>🌸 练习生模拟器</h1><div class="meta-info"><div>📆 <span id="monthDisplay">1</span> / 36</div><div>🏷️ <span id="flagDisplay">新人</span></div></div></div>
<div class="profile-radar-row">
<div class="profile-card">
<div class="name-area"><span class="name-display" id="playerNameDisplay">林娜恩</span><span class="badge">🎤 练习生</span></div>
<div class="profile-detail"><span class="tag">🏢 DreamHaus Ent.</span><span class="tag">🎂 <span id="ageDisplay">17</span>岁</span><span class="tag">⭐ <span id="rankDisplay">C</span> 级</span></div>
<div class="extra-info"><span>人气: <span id="popularityLabel">0</span></span><span>体力: <span id="staminaLabel">50</span></span></div>
</div>
<div class="radar-wrapper"><canvas id="radarCanvas" width="300" height="260"></canvas></div>
</div>

<div class="stats-grid" id="statsGrid"></div>

<div class="interaction-area">
<div class="phase-title"><span>🗓️ <span id="monthYear">第 1 年 · 1 月</span></span><span class="month-badge" id="phaseBadge">📋 安排日程</span></div>
<div class="schedule-buttons">
<button onclick="window.handleSchedule('dance')">💃 舞蹈</button>
<button onclick="window.handleSchedule('vocal')">🎤 声乐</button>
<button onclick="window.handleSchedule('rap')">🎧 说唱</button>
<button onclick="window.handleSchedule('visual')">✨ 外貌</button>
<button onclick="window.handleSchedule('rest')">🧘 休息</button>
<button onclick="window.handleSchedule('social')">📱 社交</button>
<button onclick="window.handleSchedule('mental')">🧠 心理</button>
</div>
<div class="story-box"><div class="story-text" id="storyText">👋 欢迎来到 DreamHaus！<br>作为新入社的练习生，你即将开始为期三年的逐梦之旅。请先安排你第一个月的训练计划吧！</div><div class="story-options" id="storyOptions"></div></div>
<div class="feedback-toast" id="feedbackToast">✨ 点击日程安排你的本月计划</div>
<div class="reset-area"><button class="reset-btn" onclick="window.resetGame()">🔄 重新开始</button></div>
</div>
</div>

function getStatValue(k){ return Math.min(100,Math.max(0,state.stats[k]||0)); }
function applyEffects(effects){ var msg=[]; for(var k in effects){ if(state.stats.hasOwnProperty(k)){ var old=state.stats[k], delta=effects[k], nv=Math.min(100,Math.max(0,old+delta)); state.stats[k]=nv; if(delta!==0){ msg.push(STAT_LABELS[k]+' '+(delta>0?'+':'')+delta); } } } return msg.join(' · '); }
function addFlag(flag){ if(flag && !state.flags.includes(flag)){ state.flags.push(flag); if(state.flags.length>5) state.flags.shift(); } }

function checkMilestones(){
    var triggered = [];
    STAT_KEYS.forEach(function(key){
        if(!milestoneTriggered[key] && getStatValue(key) >= 80){
            milestoneTriggered[key] = true;
            triggered.push(key);
        }
    });
    if(triggered.length > 0){
        triggered.forEach(function(key){ milestoneQueue.push(key); });
        if(!isProcessingMilestone) processMilestoneQueue();
    }
}
function processMilestoneQueue(){
    if(milestoneQueue.length === 0 || isProcessingMilestone) return;
    isProcessingMilestone = true;
    var key = milestoneQueue.shift();
    var data = MILESTONE_TEXTS[key];
    if(!data){ isProcessingMilestone=false; processMilestoneQueue(); return; }
    var modal = document.getElementById('milestoneModal');
    var content = document.getElementById('milestoneContent');
    content.innerHTML = '<span class="ms-icon">'+data.icon+'</span><div class="ms-title">🎉 '+data.title+'</div><div class="ms-desc">'+data.desc+'</div><button class="ms-btn" onclick="window.closeMilestone()">继续</button>';
    modal.style.display = 'flex';
}
function closeMilestone(){
    document.getElementById('milestoneModal').style.display = 'none';
    isProcessingMilestone = false;
    if(milestoneQueue.length > 0) setTimeout(function(){ processMilestoneQueue(); }, 300);
}

function renderStats(){
    var grid=document.getElementById('statsGrid'); grid.innerHTML='';
    STAT_KEYS.forEach(function(key){
        var val=getStatValue(key);
        var div=document.createElement('div'); div.className='stat-item';
        div.innerHTML='<span class="label">'+STAT_LABELS[key]+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+val+'%;background:'+STAT_COLORS[STAT_KEYS.indexOf(key)]+';"></div></div><span class="val">'+Math.round(val)+'</span>';
        grid.appendChild(div);
    });
    document.getElementById('popularityLabel').textContent=Math.round(getStatValue('popularity'));
    document.getElementById('staminaLabel').textContent=Math.round(getStatValue('stamina'));
    var avg=STAT_KEYS.filter(function(k){return k!=='popularity'&&k!=='stamina'&&k!=='mental';}).reduce(function(s,k){return s+getStatValue(k);},0)/4;
    var rank='F'; if(avg>80) rank='A'; else if(avg>65) rank='B'; else if(avg>50) rank='C'; else if(avg>35) rank='D'; else rank='E';
    document.getElementById('rankDisplay').textContent=rank;
}
function renderRadar(){
    try{
        var canvas=document.getElementById('radarCanvas'); if(!canvas) return;
        var ctx=canvas.getContext('2d'); if(!ctx) return;
        var w=canvas.width, h=canvas.height;
        ctx.clearRect(0,0,w,h);
        var cx=w/2, cy=h/2+6, radius=Math.min(w,h)*0.38, keys=STAT_KEYS, n=keys.length;
        var angles=keys.map(function(_,i){ return (i/n)*2*Math.PI - Math.PI/2; });
        ctx.strokeStyle='#f0ddd5'; ctx.lineWidth=1.2;
        for(var level=1; level<=5; level++){ var r=radius/5*level; ctx.beginPath(); for(var i=0;i<n;i++){ var x=cx+r*Math.cos(angles[i]), y=cy+r*Math.sin(angles[i]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.closePath(); ctx.stroke(); }
        for(var i=0;i<n;i++){ var x=cx+radius*Math.cos(angles[i]), y=cy+radius*Math.sin(angles[i]); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.strokeStyle='#f0ddd5'; ctx.stroke(); var lr=radius+18, lx=cx+lr*Math.cos(angles[i]), ly=cy+lr*Math.sin(angles[i]); ctx.fillStyle='#b29084'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(STAT_LABELS[keys[i]],lx,ly); }
        var values=keys.map(function(k){ return getStatValue(k)/100; });
        ctx.beginPath(); for(var i=0;i<n;i++){ var r=radius*values[i], x=cx+r*Math.cos(angles[i]), y=cy+r*Math.sin(angles[i]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.closePath(); ctx.fillStyle='rgba(221,160,145,0.35)'; ctx.fill(); ctx.strokeStyle='#d4877a'; ctx.lineWidth=2.5; ctx.stroke(); for(var i=0;i<n;i++){ var r=radius*values[i], x=cx+r*Math.cos(angles[i]), y=cy+r*Math.sin(angles[i]); ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI); ctx.fillStyle='#d4877a'; ctx.fill(); }
    }catch(e){ console.warn('雷达图出错',e); }
}
function updateUI(){
    renderStats(); renderRadar();
    var m=state.month+1, year=Math.ceil(m/12), mon=((m-1)%12)+1;
    document.getElementById('monthDisplay').textContent=m;
    document.getElementById('monthYear').textContent='第 '+year+' 年 · '+mon+' 月';
    document.getElementById('flagDisplay').textContent=state.flags.length?state.flags.slice(-1)[0]:'新人';
    document.getElementById('playerNameDisplay').textContent=state.name;
    var age = 17 + Math.floor(state.month / 12);
    document.getElementById('ageDisplay').textContent=age;
}

function handleSchedule(action){
    if(state.gameOver || state.phase!=='schedule') return;
    var effects={}, baseMsg='';
    switch(action){
        case'dance': effects={dance: 1+Math.floor(Math.random()*2), stamina: -2, mental: 1}; baseMsg='💃 练舞'; break;
        case'vocal': effects={vocal: 1+Math.floor(Math.random()*2), stamina: -2, mental: 1}; baseMsg='🎤 练声'; break;
        case'rap': effects={rap: 1+Math.floor(Math.random()*2), stamina: -2, mental: 1}; baseMsg='🎧 说唱'; break;
        case'visual': effects={visual: 1+Math.floor(Math.random()*2), popularity: 1}; baseMsg='✨ 外貌'; break;
        case'rest': effects={stamina: 1+Math.floor(Math.random()*2), mental: 2, popularity: -1}; baseMsg='🧘 休息'; break;
        case'social': startSocial(); return;
        case'mental': effects={mental: 1+Math.floor(Math.random()*2), stamina: -1}; baseMsg='🧠 心理'; break;
        default: return;
    }
    for(var k in effects){ if(state.stats.hasOwnProperty(k)){ var v=state.stats[k]+effects[k]; state.stats[k]=Math.min(100,Math.max(0,v)); } }
    var feedback=applyEffects(effects);
    document.getElementById('feedbackToast').textContent='✅ '+baseMsg+' → '+feedback;
    updateUI();
    checkMilestones();
    state.phase='story';
    document.getElementById('phaseBadge').textContent='🎬 剧情选择';
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=true; });
    triggerStory();
}

function triggerStory(){
    var month=state.month;
    var story=STORY_EVENTS[month];
    if(!story){
        story={text:'本月训练平稳。', options:[
            {text:'🎯 基本功', effect:{vocal:2,dance:2,stamina:-1}, flag:'basic'},
            {text:'📈 挑战高难', effect:{dance:3,stamina:-2,mental:1}, flag:'challenger'},
            {text:'🧘 放松调整', effect:{stamina:3,mental:3}, flag:'relax'},
            {text:'🎵 新曲目', effect:{vocal:3,rap:2}, flag:'newmusic'}
        ]};
    }
    state.pendingStory=story;
    document.getElementById('storyText').textContent=story.text||'发生了一些事...';
    var optContainer=document.getElementById('storyOptions');
    optContainer.innerHTML='';
    if(story.options && story.options.length>0){
        story.options.forEach(function(opt,idx){
            var btn=document.createElement('button');
            btn.textContent=opt.text||'选项 '+(idx+1);
            btn.onclick=function(){ handleStoryChoice(idx); };
            optContainer.appendChild(btn);
        });
    } else { setTimeout(function(){ finishMonth(); },800); }
}
function handleStoryChoice(idx){
    if(state.storyChosen || state.gameOver) return;
    state.storyChosen=true;
    var story=state.pendingStory;
    if(!story || !story.options || !story.options[idx]) return;
    var choice=story.options[idx];
    if(choice.effect){ for(var k in choice.effect){ if(state.stats.hasOwnProperty(k)){ var v=state.stats[k]+choice.effect[k]; state.stats[k]=Math.min(100,Math.max(0,v)); } } }
    if(choice.flag) addFlag(choice.flag);
    var feedback=choice.effect?applyEffects(choice.effect):'无属性变化';
    document.getElementById('feedbackToast').textContent='📖 剧情选择: '+choice.text+' → '+feedback;
    updateUI();
    checkMilestones();
    document.querySelectorAll('#storyOptions button').forEach(function(b){ b.disabled=true; });
    setTimeout(function(){ finishMonth(); },900);
}
function finishMonth(){
    state.month++;
    state.storyChosen=false;
    state.phase='schedule';
    document.getElementById('phaseBadge').textContent='📋 安排日程';
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=false; });
    document.getElementById('storyOptions').innerHTML='';
    if(state.month>=36){ state.gameOver=true; showEnding(); return; }
    var msgs=['🌈 新的一月！','☕ 咖啡厅新品～','📈 表现不错！','🌙 梦想发光。','🎵 新编舞老师！','📱 粉丝增长。','💪 体能加量。'];
    document.getElementById('storyText').textContent=msgs[state.month%msgs.length]+'\n请选择本月的训练日程。';
    document.getElementById('feedbackToast').textContent='📅 新的一月，选择日程！';
    updateUI();
}

// ========================================================================
//  社交恋爱系统核心
// ========================================================================
var currentSocialData = null;

function startSocial(){
    if(state.gameOver || state.phase!=='schedule') return;
    
    // 检查是否有恋爱对象且未被劝分
    if(loveInterest && !isLoveBroken){
        var person = loveInterest;
        var scene = SOCIAL_SCENES[Math.floor(Math.random() * SOCIAL_SCENES.length)];
        var displayText = '💕 你的恋爱对象 ' + person.emoji + ' ' + person.name + ' 来找你了。\n';
        displayText += '"' + scene.text + '"\n\n你如何回应？';
        currentSocialData = { person: person, scene: scene, chosen: false };
        showSocialOptions(displayText, scene.options);
        return;
    }
    
    // 随机挑选一个人（70%练习生，30%前辈）
    var pool = SOCIAL_POOL;
    var person;
    if(Math.random() < 0.7){
        var trainees = TRAINEES;
        person = trainees[Math.floor(Math.random() * trainees.length)];
    } else {
        var seniors = SENIORS;
        person = seniors[Math.floor(Math.random() * seniors.length)];
    }
    
    if(!chatCount[person.name]) chatCount[person.name] = 0;
    chatCount[person.name]++;
    
    var scene = SOCIAL_SCENES[Math.floor(Math.random() * SOCIAL_SCENES.length)];
    var displayText = person.emoji + ' ' + person.name + '（' + person.type + '，' + person.personality + '）\n';
    displayText += '"' + scene.text + '"\n\n你如何回应？';
    currentSocialData = { person: person, scene: scene, chosen: false };
    showSocialOptions(displayText, scene.options);
}

function showSocialOptions(text, options){
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=true; });
    document.getElementById('phaseBadge').textContent = '💬 社交对话';
    document.getElementById('storyText').textContent = text;
    var optContainer = document.getElementById('storyOptions');
    optContainer.innerHTML = '';
    options.forEach(function(opt, idx){
        var btn = document.createElement('button');
        btn.textContent = opt.text;
        btn.onclick = function(){ handleSocialChoice(idx); };
        optContainer.appendChild(btn);
    });
    document.getElementById('feedbackToast').textContent = '💬 选择你的回应...';
}

function handleSocialChoice(idx){
    if(currentSocialData.chosen || state.gameOver) return;
    currentSocialData.chosen = true;
    var data = currentSocialData;
    var person = data.person;
    var scene = data.scene;
    var choice = scene.options[idx];
    if(!choice) return;
    
    var affinity = PERSONALITY_AFFINITY[person.personality] || { good:1, normal:0, bad:-1 };
    var popDelta = 0;
    if(choice.type === 'good') popDelta = affinity.good;
    else if(choice.type === 'normal') popDelta = affinity.normal;
    else if(choice.type === 'bad') popDelta = affinity.bad;
    popDelta = Math.min(2, Math.max(-2, popDelta));
    
    var effects = choice.effect || {};
    effects.popularity = (effects.popularity || 0) + popDelta;
    var msg = [];
    for(var k in effects){
        if(state.stats.hasOwnProperty(k)){
            var v = state.stats[k] + effects[k];
            state.stats[k] = Math.min(100, Math.max(0, v));
            if(effects[k] !== 0){
                msg.push(STAT_LABELS[k] + ' ' + (effects[k] > 0 ? '+' : '') + effects[k]);
            }
        }
    }
    if(popDelta !== 0) msg.push('人气 ' + (popDelta > 0 ? '+' : '') + popDelta);
    
    var feedback = msg.join(' · ') || '无变化';
    document.getElementById('feedbackToast').textContent = '💬 与 ' + person.name + ' 的对话结束 → ' + feedback;
    
    // 检查是否触发恋爱（聊天2次且不是前辈且未恋爱）
    if(!loveInterest && person.type === '练习生' && chatCount[person.name] >= 3){
        var loveOpt = confirm('💕 你与 ' + person.name + ' 心有灵犀，感觉很有默契。\n要开始恋爱吗？（确定=恋爱，取消=保持朋友）');
        if(loveOpt){
            loveInterest = person;
            isInLove = true;
            loveCount = 0;
            document.getElementById('feedbackToast').textContent = '💕 你和 ' + person.name + ' 开始了恋爱关系！';
        } else {
            document.getElementById('feedbackToast').textContent = '你们决定保持朋友关系。';
        }
    }
    
    if(loveInterest && person.name === loveInterest.name && isInLove && !isLoveBroken){
        loveCount++;
        if(loveCount > 3){
            isLoveBroken = true;
            document.getElementById('feedbackToast').textContent = '💔 公司发现了你们的恋情，要求你们分手！';
            alert('💔 公司发现了你和 ' + loveInterest.name + ' 的恋情，强制要求分手。你们最终选择了事业。');
            loveInterest = null;
            isInLove = false;
        }
    }
    
    document.getElementById('storyText').textContent = '🤝 你和 ' + person.name + ' 的对话结束了。\n' + choice.text;
    document.getElementById('storyOptions').innerHTML = '';
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=true; });
    updateUI();
    checkMilestones();
    
    setTimeout(function(){
        currentSocialData = null;
        state.phase = 'story';
        document.getElementById('phaseBadge').textContent = '🎬 剧情选择';
        triggerStory();
    }, 1200);
}

// ========================================================================
//  启动与重置
// ========================================================================
function startGame(){
    var name=document.getElementById('nameInput').value.trim()||'林娜恩';
    state.name=name;
    document.getElementById('playerNameDisplay').textContent=name;
    var glow=document.getElementById('startGlow');
    glow.classList.add('active');
    var screen=document.getElementById('startScreen');
    screen.classList.add('hidden');
    setTimeout(function(){
        var app=document.getElementById('gameApp');
        app.style.display='block';
        requestAnimationFrame(function(){ app.classList.add('fade-in'); });
        state.month=0;
        state.stats={vocal:20,dance:20,rap:15,visual:25,stamina:50,mental:45,popularity:10};
        state.flags=[];
        state.gameOver=false;
        state.phase='schedule';
        state.storyChosen=false;
        state.pendingStory=null;
        milestoneTriggered = { vocal:false, dance:false, rap:false, visual:false, stamina:false, mental:false, popularity:false };
        milestoneQueue = [];
        isProcessingMilestone = false;
        loveInterest = null;
        chatCount = {};
        isInLove = false;
        loveCount = 0;
        isLoveBroken = false;
        document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=false; });
        document.getElementById('storyOptions').innerHTML='';
        document.getElementById('storyText').textContent='👋 欢迎来到 DreamHaus！\n作为新入社的练习生，你即将开始为期三年的逐梦之旅。请先安排你第一个月的训练计划吧！';
        document.getElementById('feedbackToast').textContent='✨ 点击日程安排你的本月计划';
        document.getElementById('phaseBadge').textContent='📋 安排日程';
        setTimeout(function(){ glow.classList.remove('active'); }, 800);
        updateUI();
    }, 500);
}
function resetGame(){
    document.getElementById('startScreen').classList.remove('hidden');
    document.getElementById('gameApp').style.display='none';
    document.getElementById('gameApp').classList.remove('fade-in');
    document.getElementById('nameInput').value=state.name||'姓名';
    state.month=0;
    state.stats={vocal:20,dance:20,rap:15,visual:25,stamina:50,mental:45,popularity:10};
    state.flags=[];
    state.gameOver=false;
    state.phase='schedule';
    state.storyChosen=false;
    state.pendingStory=null;
    milestoneTriggered = { vocal:false, dance:false, rap:false, visual:false, stamina:false, mental:false, popularity:false };
    milestoneQueue = [];
    isProcessingMilestone = false;
    loveInterest = null;
    chatCount = {};
    isInLove = false;
    loveCount = 0;
    isLoveBroken = false;
    document.querySelectorAll('.schedule-buttons button').forEach(function(b){ b.disabled=false; });
    document.getElementById('storyOptions').innerHTML='';
    document.getElementById('storyText').textContent='👋 重新开始，输入名字后开始新旅程吧！';

}

window.startGame = startGame;
window.handleSchedule = handleSchedule;
window.resetGame = resetGame;
window.closeMilestone = closeMilestone;
